   <style>
    /* BODY */
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #b2b2b2;
    }

    /* MAIN CONTAINER (WRAPPER) */
    .container-main {
      max-width: 38rem;
      margin: 0 auto;
      padding: 3rem 1rem;
    }

    /* CARD UTAMA */
    .card-main {
      background: white;
      border-radius: 1.5rem;
      padding-bottom: 2rem;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
    }

    /* BUTTON ICON DI HEADER */
    .icon-button {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .icon-button img {
      width: 1.1rem;
      height: 1.1rem;
    }

    /* PROFILE SECTION */
    .profile-image {
      width: 5.5rem;
      height: 5.5rem;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto;
    }

    .profile-name {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin: 0.75rem 0 1.5rem;
    }

    /* CONTAINER UNTUK LIST LINK */
    .link-container {
      padding: 0 2rem;
    }

    /* KOTAK LINK */
    .link-card {
      display: flex;
      align-items: center;
      background: #ebeef1;
      border-radius: 0.5rem;
      text-decoration: none;
      color: #1a1a1a;

      padding: 1rem;
      margin-bottom: 0.8rem;
      min-height: 3.5rem;

      box-shadow: 0 0.09375rem 0.1875rem rgba(0,0,0,0.12);
      transition: 0.2s;
    }

    .link-card:hover {
      filter: brightness(0.95);
      text-decoration: none;
      color: #1a1a1a;
    }

    /* TEXT DI DALAM LINK */
    .link-text {
      flex: 1;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ICON TITIK 3 */
    .link-menu {
      color: #999;
      onclick="showme";
    }

    /* BUTTON JOIN */
    .join-button {
      display: block;
      max-width: 15rem;
      margin: 4rem auto 1rem;
      background: #fff;
      border-radius: 2rem;
      padding: 0.7rem;
      text-align: center;
      font-weight: 700;
      text-decoration: none;
      color: #1a1a1a;

      box-shadow: 0 0.125rem 0.375rem rgba(0,0,0,0.1);
    }

    .join-button:hover {
      text-decoration: none;
      color: #1a1a1a;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: #555;
      padding: 2rem 0;
    }

    .footer a {
      color: #555;
      text-decoration: none;
      margin: 0 0.3rem;
    }

    /* RESPONSIVE MOBILE */
    @media (max-width: 36rem) {
      .container-main {
        padding: 0;
      }

      .card-main {
        border-radius: 0;
      }
    }

  </style>
</head>

<body>

      </div>
    </div>
  </div>
